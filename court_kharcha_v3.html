<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>कोर्ट खर्च भुगतान</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th{
    background:#111827;
    color:white;
    padding:14px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.amount{
    color:red;
    font-weight:bold;
    font-size:18px;
}

.advance{
    color:green;
    font-weight:bold;
    font-size:18px;
}

.paybtn{
    background:#16a34a;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    display:inline-block;
    font-weight:bold;
    margin-top:5px;
    border:none;
    cursor:pointer;
}

.note{
    margin-top:25px;
    text-align:center;
    color:red;
    font-size:18px;
    font-weight:bold;
}

#popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:white;
    width:90%;
    max-width:400px;
    padding:20px;
    border-radius:12px;
    position:relative;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

.submitbtn{
    width:100%;
    background:#2563eb;
    color:white;
    border:none;
    padding:14px;
    margin-top:15px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.closebtn{
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>कोर्ट खर्च भुगतान</h1>

<table>

<tr>
<th>नाम</th>
<th>स्थिति</th>
<th>Payment</th>
</tr>


<tr>
<td>अवनीश</td>

<td class="advance">
Advance ₹3000
</td>

<td>

<button class="paybtn"
style="background:#2563eb;">
Already Paid
</button>

</td>
</tr>



<tr>
<td>गोलू</td>

<td class="amount">
₹4000
</td>

<td>

<a class="paybtn"
href="upi://pay?pa=avnish.dev@ptyes&pn=Avnish&am=4000&cu=INR&tn=Golu Court Fee">

Pay Now

</a>

<br><br>

<button class="paybtn"
onclick="openForm('गोलू','4000')">

Screenshot Send

</button>

</td>
</tr>



<tr>
<td>अंकुल</td>

<td class="amount">
₹5000
</td>

<td>

<a class="paybtn"
href="upi://pay?pa=avnish.dev@ptyes&pn=Avnish&am=5000&cu=INR&tn=Ankul Court Fee">

Pay Now

</a>

<br><br>

<button class="paybtn"
onclick="openForm('अंकुल','5000')">

Screenshot Send

</button>

</td>
</tr>



<tr>
<td>लल्ली</td>

<td class="amount">
₹5000
</td>

<td>

<a class="paybtn"
href="upi://pay?pa=avnish.dev@ptyes&pn=Avnish&am=5000&cu=INR&tn=Lalli Court Fee">

Pay Now

</a>

<br><br>

<button class="paybtn"
onclick="openForm('लल्ली','5000')">

Screenshot Send

</button>

</td>
</tr>



<tr>
<td>पवन</td>

<td class="amount">
₹4200
</td>

<td>

<a class="paybtn"
href="upi://pay?pa=avnish.dev@ptyes&pn=Avnish&am=4200&cu=INR&tn=Pawan Court Fee">

Pay Now

</a>

<br><br>

<button class="paybtn"
onclick="openForm('पवन','4200')">

Screenshot Send

</button>

</td>
</tr>



<tr>
<td>अभय</td>

<td class="amount">
₹5000
</td>

<td>

<a class="paybtn"
href="upi://pay?pa=avnish.dev@ptyes&pn=Avnish&am=5000&cu=INR&tn=Abhay Court Fee">

Pay Now

</a>

<br><br>

<button class="paybtn"
onclick="openForm('अभय','5000')">

Screenshot Send

</button>

</td>
</tr>

</table>



<div id="popup">

<div class="popup-box">

<button class="closebtn"
onclick="closeForm()">

X

</button>

<h2>Payment Details</h2>

<input type="text"
id="name"
placeholder="नाम">

<input type="text"
id="amount"
placeholder="अमाउंट">

<textarea id="comment"
placeholder="Comment / Payment किसलिए दिया">
</textarea>


<label style="display:block;margin-top:15px;font-weight:bold;">

Screenshot Upload

</label>

<input type="file"
id="screenshot"
accept="image/*">


<p style="color:red;font-size:14px;">

WhatsApp खुलने के बाद screenshot attach करके भेजें।

</p>


<button class="submitbtn"
onclick="sendWhatsApp()">

Open WhatsApp

</button>

</div>

</div>



<p class="note">

Payment करने के बाद screenshot attach करके भेजना जरूरी है।

</p>



<script>

function openForm(name, amount){

document.getElementById("popup").style.display="flex";

document.getElementById("name").value=name;

document.getElementById("amount").value=amount;

}


function closeForm(){

document.getElementById("popup").style.display="none";

}


function sendWhatsApp(){

let name =
document.getElementById("name").value;

let amount =
document.getElementById("amount").value;

let comment =
document.getElementById("comment").value;

let msg =
`Payment Done

नाम: ${name}

अमाउंट: ₹${amount}

Comment: ${comment}

Screenshot attach करके भेज रहा हूँ.`;

window.open(
`https://wa.me/919455030291?text=${encodeURIComponent(msg)}`,
'_blank'
);

}

</script>

</body>

</html>
